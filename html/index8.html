<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>List and Table Tag</h1>
    <h2>List</h2>
    <ol>
        <li>Java</li>
        <li>Python</li>
        <li>MERN</li>
    </ol>
    <ul>
        <li>Java</li>
        <li>Python</li>
        <li>MERN</li>
    </ul>
    <dl>
        <dt>MERN Stack course</dt>
        <dd>Reactjs</dd>
        <dd>Nodejs</dd>
        <dd>Expressjs</dd>
        <dd>MongoDB</dd>
        <dt>Java Full Stack course</dt>
        <dd>Ractjs</dd>
        <dd>Java</dd>
        <dd>MySQL</dd>
    </dl>
    <h2>Table</h2>
    <table border="1">
        <caption>Result</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Shivam</td>
                <td>84</td>
            </tr>
            <tr>
                <td>Rahul</td>
                <td>68</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Average</td>
                <td>76</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
