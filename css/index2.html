<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* li{
            display: inline;
            width: 500px;
            can not modify but in inline-block we can modify
        } */
        li{
            display: inline-block;
            margin: 10px;
        }
        .flex{
            display: flex;
            justify-content: space-around;
            background-color: yellow;
            height: 300px;
            align-items: center;
            flex-wrap: wrap;
            flex-direction: column;
        }
        .grid{
            display: grid;
            grid-template-columns: auto auto auto auto;
            background-color: pink;
            column-gap: 20px;
            row-gap: 30px;
            justify-content: space-around;
            align-items: center;
            height: 300px;
        }
    </style>
</head>
<body>
    <h1>CSS diaplay property</h1>
    <h2>inline vs inline-block</h2>
    <li>Home</li>
    <li>Services</li>
    <li>Projects</li>
    <li>About</li>
    <hr>
    <h2>Flexbox</h2>
    <div class="flex">
        <div>Child1 Child1</div>
        <div>Child2 Child2</div>
        <div>Child3 Child3</div>
        <div>Child4 Child4</div>
        <div>Child5 Child5</div>
        <div>Child6 Child6</div>
    </div>
    <hr>
    <h2>Grid</h2>
    <div class="grid">
        <div>Child1</div>
        <div>Child2</div>
        <div>Child3</div>
        <div>Child4</div>
        <div>Child5</div>
        <div>Child6</div>
    </div>
</body>
</html>
